#################
### AUTOSTART ###
#################

# Autostart necessary processes (like notifications daemons, status bars, etc.)

exec-once = hyprpaper
exec-once = waypaper --restore
exec-once = waybar
exec-once = swaync
exec-once = systemctl --user start hyprpolkitagent
exec-once = wl-paste --type text --watch cliphist store && cliphist list | tail -n +21 | cliphist delete # Stores only text data (keeps only the last 20 items)
exec-once = wl-paste --type image --watch cliphist store && cliphist list | tail -n +21 | cliphist delete # Stores only image data (keeps only the last 20 items)
exec-once = hypridle