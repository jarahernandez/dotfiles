###################
### KEYBINDINGS ###
###################

# See https://wiki.hypr.land/Configuring/Keywords/
$mainMod = SUPER # Sets "Windows" key as main modifier

bind = $mainMod, Return, exec, $terminal # Terminal
bind = $mainMod, Q, killactive, # Close window
bind = $mainMod, M, exec, command -v hyprshutdown >/dev/null 2>&1 && hyprshutdown || hyprctl dispatch exit # Terminate Hyprland session
bind = $mainMod, E, exec, $fileManager # File manager
bind = $mainMod SHIFT, V, togglefloating, # Toggle window floating/tiling
bind = $mainMod, Space, exec, $menu # Launch apps
bind = $mainMod, P, pseudo, # Pseudo window
bind = $mainMod, J, layoutmsg, togglesplit # Toggle window split

# Extra
bind = $mainMod SHIFT, Return, exec, $browser # Browser
bind = $mainMod, R, exec, killall -9 waybar && waybar & # Reload waybar
bind = $mainMod, H, exec, ~/.config/rofi/scripts/key-help.sh # Show key bindings
bind = $mainMod, L, exec, hyprlock # Lock system
bind = , Print, exec, pgrep slurp || hyprshot -m region # Screenshot
bind = SUPER, V, exec, ~/.config/rofi/scripts/clipboard.sh # Clipboard
bind = $mainMod, Escape, exec, swaync-client -t -sw # Control/Notification center
bind = $mainMod, W, exec, pgrep waypaper || waypaper # Select wallpaper
bind = CTRL SHIFT, ESCAPE, exec, kitty --class btop-float btop # System monitor

# Move focus with mainMod + arrow keys
bind = $mainMod, left, movefocus, l # Move window focus left
bind = $mainMod, right, movefocus, r # Move window focus right
bind = $mainMod, up, movefocus, u # Move window focus up
bind = $mainMod, down, movefocus, d # Move window focus down

# Swap active active window
bind = $mainMod SHIFT, left, swapwindow, l # Swap window to the left
bind = $mainMod SHIFT, right, swapwindow, r # Swap window to the right
bind = $mainMod SHIFT, up, swapwindow, u # Swap window up
bind = $mainMod SHIFT, down, swapwindow, d # Swap window down

# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, workspace, 1 # Switch to workspace 1
bind = $mainMod, 2, workspace, 2 # Switch to workspace 2
bind = $mainMod, 3, workspace, 3 # Switch to workspace 3
bind = $mainMod, 4, workspace, 4 # Switch to workspace 4
bind = $mainMod, 5, workspace, 5 # Switch to workspace 5
bind = $mainMod, 6, workspace, 6 # Switch to workspace 6
bind = $mainMod, 7, workspace, 7 # Switch to workspace 7
bind = $mainMod, 8, workspace, 8 # Switch to workspace 8
bind = $mainMod, 9, workspace, 9 # Switch to workspace 9
bind = $mainMod, 0, workspace, 10 # Switch to workspace 10

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, movetoworkspace, 1 # Move window to workspace 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2 # Move window to workspace 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3 # Move window to workspace 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4 # Move window to workspace 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5 # Move window to workspace 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6 # Move window to workspace 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7 # Move window to workspace 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8 # Move window to workspace 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9 # Move window to workspace 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10 # Move window to workspace 10

# Example special workspace (scratchpad)
bind = $mainMod, S, togglespecialworkspace, magic # Switch to scratchpad
bind = $mainMod SHIFT, S, movetoworkspace, special:magic # Move window to scratchpad

# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Laptop multimedia keys for volume and LCD brightness
bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = ,XF86MonBrightnessUp, exec, brightnessctl set 5%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl set 5%-

# Requires playerctl
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous
